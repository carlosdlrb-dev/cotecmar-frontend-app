  #     - .:/app
  #     - /app/node_modules
  #   ports:
  #     - "5173:5173"
  #   command: sh -c "npm install && npm run dev -- --host"
  #   restart: unless-stopped
  #   networks:
  #     - cotecmar-network

networks:
  cotecmar-network:
    driver: bridge
