version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cotecmar-frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - cotecmar-network

  # Descomenta para desarrollo con hot reload
